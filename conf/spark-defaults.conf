# Minimal Spark defaults for YARN submits from spark-client.
# The checker tool can later diff this against what jobs actually receive.

spark.master                     yarn
spark.submit.deployMode          client
spark.yarn.archive               hdfs:///user/spark/spark-jars.zip
spark.eventLog.enabled           false
spark.ui.showConsoleProgress     true

# Driver / executor sizing matching yarn-site caps (max-allocation-mb=2048)
spark.driver.memory              1g
spark.executor.memory            1g
spark.executor.cores             1
spark.executor.instances         2